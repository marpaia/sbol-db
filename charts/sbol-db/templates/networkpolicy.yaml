{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sbol-db.fullname" . }}
  labels: {{- include "sbol-db.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "sbol-db.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8080
          protocol: TCP
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS for cluster-internal service resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Postgres.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
    {{- if .Values.networkPolicy.allowOntologyFetch }}
    # OBO Foundry over HTTPS, for `sbol-db ontology fetch …`.
    - ports:
        - port: 443
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
