{{- /*
The DSN Secret is only rendered when the chart owns the value. When the
operator points at a pre-existing Secret (`externalDatabase.existingSecret.name`),
this template emits nothing and the Deployment references the external
Secret directly.
*/ -}}
{{- if not .Values.externalDatabase.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sbol-db.databaseSecretName" . }}
  labels: {{- include "sbol-db.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "sbol-db.databaseUrl" . | quote }}
{{- end }}
