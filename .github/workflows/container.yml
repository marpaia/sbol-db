name: container

# Builds the sbol-db image and pushes it to GHCR. Commits to master are
# tagged with both the short and the long commit hash; `v*` tag pushes are
# tagged with the tag name (e.g. v0.2.0). Manual runs are available via
# workflow_dispatch.
on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe --tags --exact-match` can
          # find an annotated tag on the current commit.
          fetch-depth: 0
          fetch-tags: true

      - id: version
        name: Resolve image tags
        # A `v*` tag push tags the image with the tag name. Any other build
        # (a commit to master) tags it with both the short and the long
        # commit hash.
        run: |
          set -euo pipefail
          REPO=ghcr.io/marpaia/sbol-db
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          {
            echo "tags<<EOF"
            if [ -n "$GIT_TAG" ]; then
              echo "$REPO:$GIT_TAG"
            else
              echo "$REPO:$(git rev-parse --short HEAD)"
              echo "$REPO:$(git rev-parse HEAD)"
            fi
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.version.outputs.tags }}
          # Reuse the buildkit layer cache across runs so the cargo-chef
          # dependency layer doesn't rebuild every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
