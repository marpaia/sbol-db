name: container

# Automatic builds fire on `v*` tag pushes; manual runs are always
# available via workflow_dispatch. To also build every commit to master,
# uncomment the `branches:` line below.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
    # branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so `git describe --tags --exact-match`
          # can find an annotated tag on the current commit.
          fetch-depth: 0
          fetch-tags: true

      - id: version
        name: Resolve image tag
        # Mirrors the logic in the repo's Makefile:
        #   VERSION := $(or $(GIT_TAG),$(GIT_HASH)$(GIT_DIRTY))
        # where GIT_TAG is `git describe --tags --exact-match --dirty` on
        # the current commit and the hash form is `<short-sha>[-dirty]`.
        run: |
          set -euo pipefail
          GIT_TAG=$(git describe --tags --exact-match --dirty 2>/dev/null || true)
          if [ -n "$GIT_TAG" ]; then
            VERSION="$GIT_TAG"
          else
            GIT_HASH=$(git rev-parse --short HEAD)
            DIRTY=""
            if ! git diff --quiet HEAD; then
              DIRTY="-dirty"
            fi
            VERSION="${GIT_HASH}${DIRTY}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $VERSION"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/marpaia/sbol-db:${{ steps.version.outputs.tag }}
          # Reuse buildkit layer cache across runs so the cargo-chef
          # dependency layer doesn't rebuild every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
